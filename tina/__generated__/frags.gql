fragment PeliculaParts on Pelicula {
  __typename
  title
  poster
  youtubeTrailer
  synopsis
  credits
  showDate
  showTime
  showEndTime
  featured
  duration
  country
  location {
    ... on Ubicacion {
      __typename
      title
      address
      mapCoordinates
      instagramReel
      image
    }
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
    }
  }
}

fragment EventoParts on Evento {
  __typename
  title
  poster
  youtubeTrailer
  description
  date
  eventTime
  eventEndTime
  featured
  location {
    ... on Ubicacion {
      __typename
      title
      address
      mapCoordinates
      instagramReel
      image
    }
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
    }
  }
}

fragment UbicacionParts on Ubicacion {
  __typename
  title
  address
  mapCoordinates
  instagramReel
  image
}
